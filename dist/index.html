<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Música</title>
    <style>
        body {
            background-color: #333;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .reproductor {
            background-color: #222;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
        }
        .album {
            width: 200px;
            height: 200px;
            border-radius: 8px;
            background-color: #444;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .vinilo {
            fill: white;
            stroke-width: 3;
        }
        .song-title {
            margin-top: 16px;
            font-size: 20px;
        }
        .album-title {
            margin-top: 8px;
            font-size: 14px;
            color: #999;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: #555;
            margin-top: 32px;
        }
        .progress {
            width: 45%;
            height: 100%;
            background-color: white;
        }
        .controls {
            display: flex;
            justify-content: space-around;
            margin-top: 16px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #555;
            color: white;
        }
        button:hover {
            background-color: #777;
        }
    </style>
</head>
<body>
    <div class="reproductor">
        <div class="album">
            <svg viewBox="0 0 24 24" width="100%" height="100%">
                <circle cx="12" cy="12" r="10" fill="none" stroke="#555"/>
                <polygon points="12,6 18,12 12,18 6,12" fill="white"/>
            </svg>
        </div>
        <div class="song-title">Numb</div>
        <div class="album-title">Meteora</div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        <div class="controls">
            <button>Anterior</button>
            <button>Play/Pause</button>
            <button>Siguiente</button>
        </div>
    </div>
</body>
</html>
